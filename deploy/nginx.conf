# One origin for the whole app: serve the frontend, proxy REST to the engine, proxy the
# live WebSocket to the gateway. Same-origin → no CORS needed.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Frontend SPA — fall back to index.html for client routes.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # REST commands → Python engine. /api/hunts → engine /hunts. Swagger at /api/docs.
    location /api/ {
        proxy_pass http://engine:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Live event stream → Rust gateway. /ws/hunts/:id/stream → gateway /hunts/:id/stream.
    location /ws/ {
        proxy_pass http://gateway:8080/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;   # long-lived hunt streams
        proxy_send_timeout 3600s;
    }
}
